# Robot Physical Parameters
robot:
  name: agri_robot
  type: differential_drive
  
  # Chassis
  chassis:
    mass: 50.0  # kg
    length: 1.5  # m
    width: 0.8  # m
    height: 0.6  # m
  
  # Wheels
  wheels:
    rear:
      radius: 0.3  # m
      width: 0.2  # m
      mass: 5.0  # kg
      spacing: 1.0  # m (left-right)
    front:
      radius: 0.25  # m
      width: 0.15  # m
      mass: 3.0  # kg
      spacing: 0.8  # m (left-right)
  
  # Kinematics
  kinematics:
    wheelbase: 1.0  # m (distance front to rear)
    max_linear_velocity: 2.0  # m/s
    max_angular_velocity: 1.5  # rad/s
  
  # Control Parameters
  control:
    Pure Pursuit:
      lookahead_distance_default: 1.5  # m
      linear_speed_default: 0.8  # m/s